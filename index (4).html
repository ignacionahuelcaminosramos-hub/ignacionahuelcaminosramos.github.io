<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nacho · Editor de Video</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080A0F;
      --bg2: #111520;
      --text: #ECEEF5;
      --muted: #5A6070;
      --accent: #FF3D57;
      --line: rgba(255,255,255,0.07);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 2.5rem 2rem 3rem;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--line);
      margin-bottom: 2.5rem;
    }
    .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      letter-spacing: 0.05em;
      line-height: 1;
    }
    .name span { color: var(--accent); }
    .role {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.4rem;
    }
    .contact-pills {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .pill {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--line);
      padding: 0.45rem 0.9rem;
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .pill:hover { color: var(--text); border-color: var(--accent); }
    .pill.accent { color: var(--accent); border-color: var(--accent); }

    /* ── GRID LABEL ── */
    .grid-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ── VIDEO GRID ── */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .video-card {
      position: relative;
      background: var(--bg2);
      overflow: hidden;
      border-radius: 2px;
      cursor: pointer;
    }

    .video-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 16;
      overflow: hidden;
      background: var(--bg2);
    }

    /* Video de preview mudo en la card */
    .video-thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
      opacity: 0.75;
    }
    .video-card:hover .video-thumb video {
      transform: scale(1.03);
      opacity: 1;
    }

    .thumb-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(8,10,15,0.92) 0%, rgba(8,10,15,0.1) 50%, transparent 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1rem 0.85rem;
    }

    .thumb-num {
      position: absolute;
      top: 0.75rem;
      left: 0.85rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem;
      color: rgba(255,255,255,0.05);
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }

    .play-circle {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -60%) scale(0.9);
      width: 52px; height: 52px;
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,61,87,0.12);
      transition: transform 0.3s, border-color 0.3s, background 0.3s;
      pointer-events: none;
    }
    .play-circle svg { fill: white; width: 16px; margin-left: 3px; opacity: 0.7; transition: opacity 0.3s; }
    .video-card:hover .play-circle {
      transform: translate(-50%, -60%) scale(1.08);
      border-color: var(--accent);
      background: rgba(255,61,87,0.28);
    }
    .video-card:hover .play-circle svg { opacity: 1; }

    .vid-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }
    .vid-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem;
      letter-spacing: 0.05em;
      color: var(--text);
      line-height: 1.1;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(5,7,10,0.97);
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(16px);
    }
    .lightbox.open { display: flex; }

    .lb-inner {
      position: relative;
      height: 88vh;
      aspect-ratio: 9 / 16;
      max-width: 440px;
      border-radius: 4px;
      overflow: hidden;
      background: #000;
    }

    /* Video nativo en el lightbox */
    .lb-inner video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }

    .lb-close {
      position: absolute;
      top: -2.75rem;
      right: 0;
      background: none;
      border: 1px solid var(--line);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .lb-close:hover { border-color: var(--accent); color: var(--text); }

    /* Loading spinner dentro del lightbox */
    .lb-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: #000;
      z-index: 2;
      transition: opacity 0.3s;
    }
    .lb-loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--line);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .lb-loading p {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Fallback link si no carga */
    .lb-fallback {
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--muted);
      display: none;
      z-index: 3;
    }
    .lb-fallback:hover { color: var(--accent); border-color: var(--accent); }

    /* ── FOOTER ── */
    .footer {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-copy {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .footer-tool {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .footer-tool span { color: var(--accent); }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .video-grid { grid-template-columns: repeat(2, 1fr); }
      .header { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .contact-pills { justify-content: flex-start; }
      .name { font-size: 2.2rem; }
      .lb-inner { height: 80vh; }
    }
  </style>
</head>
<body>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <div class="lb-inner">
      <button class="lb-close" id="lbClose">✕ Cerrar</button>
      <div class="lb-loading" id="lbLoading">
        <div class="spinner"></div>
        <p>Cargando video...</p>
      </div>
      <video id="lbVideo" controls playsinline></video>
      <a class="lb-fallback" id="lbFallback" target="_blank">Abrir en Drive →</a>
    </div>
  </div>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <div class="name">Nacho<span>.</span></div>
      <div class="role">Editor de Video · CapCut · Videos cortos</div>
    </div>
    <div class="contact-pills">
      <a class="pill accent" href="mailto:ignaciocaminos846@gmail.com">ignaciocaminos846@gmail.com</a>
      <a class="pill" href="https://discord.com/users/transa6676" target="_blank">Discord: transa#6676</a>
    </div>
  </header>

  <!-- GRID LABEL -->
  <div class="grid-label">// Videos · Formato corto</div>

  <!-- VIDEO GRID -->
  <div class="video-grid">

    <div class="video-card"
         data-id="1DPdlBSlo_JqN2pan0IqIgpXbfV25U8oC"
         data-title="Video 01">
      <div class="video-thumb">
        <video muted loop playsinline preload="metadata"
               src="https://drive.google.com/uc?export=download&id=1DPdlBSlo_JqN2pan0IqIgpXbfV25U8oC">
        </video>
        <div class="thumb-num">01</div>
        <div class="play-circle">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <div class="thumb-overlay">
          <div class="vid-tag">Reel · 2026</div>
          <div class="vid-title">Video 01</div>
        </div>
      </div>
    </div>

    <div class="video-card"
         data-id="1B7kAgRObTe_K7kKrc2ZGYzIjdTo1LWx0"
         data-title="Video 02">
      <div class="video-thumb">
        <video muted loop playsinline preload="metadata"
               src="https://drive.google.com/uc?export=download&id=1B7kAgRObTe_K7kKrc2ZGYzIjdTo1LWx0">
        </video>
        <div class="thumb-num">02</div>
        <div class="play-circle">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <div class="thumb-overlay">
          <div class="vid-tag">Reel · 2026</div>
          <div class="vid-title">Video 02</div>
        </div>
      </div>
    </div>

    <div class="video-card"
         data-id="1vKZn6uAxH_JCE7z0zc6CQsCDIi4VvoMV"
         data-title="Video 03">
      <div class="video-thumb">
        <video muted loop playsinline preload="metadata"
               src="https://drive.google.com/uc?export=download&id=1vKZn6uAxH_JCE7z0zc6CQsCDIi4VvoMV">
        </video>
        <div class="thumb-num">03</div>
        <div class="play-circle">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <div class="thumb-overlay">
          <div class="vid-tag">Reel · 2026</div>
          <div class="vid-title">Video 03</div>
        </div>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-copy">© 2026 · Nacho</div>
    <div class="footer-tool">Editado con <span>CapCut</span></div>
  </footer>

  <script>
    const lightbox  = document.getElementById('lightbox');
    const lbVideo   = document.getElementById('lbVideo');
    const lbLoading = document.getElementById('lbLoading');
    const lbFallback = document.getElementById('lbFallback');

    document.querySelectorAll('.video-card').forEach(card => {
      const vid = card.querySelector('video');

      // Hover → preview mudo
      card.addEventListener('mouseenter', () => vid.play().catch(() => {}));
      card.addEventListener('mouseleave', () => { vid.pause(); vid.currentTime = 0; });

      // Click → lightbox
      card.addEventListener('click', () => {
        const id = card.dataset.id;
        const src = `https://drive.google.com/uc?export=download&id=${id}`;
        const fallback = `https://drive.google.com/file/d/${id}/view`;

        // Reset estado
        lbLoading.classList.remove('hidden');
        lbFallback.style.display = 'none';
        lbVideo.src = '';

        // Asigna src y abre
        lbVideo.src = src;
        lbFallback.href = fallback;
        lightbox.classList.add('open');

        // Cuando cargue suficiente, oculta el spinner
        lbVideo.oncanplay = () => {
          lbLoading.classList.add('hidden');
          lbVideo.play().catch(() => {});
        };

        // Si tarda más de 6s, muestra el link de fallback
        const fallbackTimer = setTimeout(() => {
          lbFallback.style.display = 'block';
        }, 6000);

        lbVideo.oncanplay = () => {
          clearTimeout(fallbackTimer);
          lbLoading.classList.add('hidden');
          lbVideo.play().catch(() => {});
        };
      });
    });

    function closeLb() {
      lightbox.classList.remove('open');
      lbVideo.pause();
      lbVideo.src = '';
      lbLoading.classList.remove('hidden');
      lbFallback.style.display = 'none';
    }

    document.getElementById('lbClose').addEventListener('click', closeLb);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLb(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });
  </script>
</body>
</html>
